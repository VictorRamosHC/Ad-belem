<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AD Belém Manager</title>

  <!-- PWA Meta -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AD Belém">

  <!-- Favicon com logo -->
  <link rel="icon" type="image/jpeg" href="./logo.jpg">
  <link rel="apple-touch-icon" href="./logo.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:      #0a1929;
      --navy2:     #112240;
      --navy3:     #1a3a5c;
      --teal:      #2ec4b6;
      --teal2:     #1a9e94;
      --teal3:     #0d7a72;
      --gold:      #f4b942;
      --danger:    #ef4444;
      --text:      #e8f4f8;
      --text-dim:  #8bafc4;
      --card:      rgba(255,255,255,0.05);
      --card-b:    rgba(255,255,255,0.10);
      --shadow:    0 4px 24px rgba(0,0,0,0.4);
      --radius:    16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      line-height: 1.5;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(160deg, #0d2137 0%, var(--navy2) 100%);
      padding: 20px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content:'';
      position:absolute; bottom:-1px; left:0; right:0; height:32px;
      background: var(--navy);
      border-radius: 32px 32px 0 0;
    }
    .header-bg {
      position:absolute; inset:0;
      background: radial-gradient(ellipse at 80% 20%, rgba(46,196,182,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 80%, rgba(46,196,182,0.07) 0%, transparent 50%);
      pointer-events:none;
    }
    .header-inner {
      position:relative; z-index:1;
      display:flex; align-items:center; gap:14px;
    }
    .logo-img {
      width:52px; height:52px; border-radius:50%;
      border:2px solid rgba(46,196,182,0.5);
      object-fit:cover;
      flex-shrink:0;
    }
    .header-text small {
      display:block; font-size:11px; font-weight:600;
      color:var(--teal); letter-spacing:2px; text-transform:uppercase;
    }
    .header-text h1 {
      font-size:22px; font-weight:900; color:var(--text);
      letter-spacing:-0.5px;
    }
    #btn-install {
      margin-left:auto;
      background:linear-gradient(135deg,var(--teal),var(--teal2));
      color:#fff; border:none; padding:8px 14px;
      border-radius:20px; font-family:'Nunito',sans-serif;
      font-size:12px; font-weight:700; cursor:pointer;
      display:none; align-items:center; gap:6px;
      box-shadow:0 4px 12px rgba(46,196,182,0.3);
      white-space:nowrap;
    }
    #btn-install.show { display:flex; }
    #btn-install svg { width:14px; height:14px; }

    /* ===== STATS ===== */
    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; padding:16px 16px 0;
      margin-top:-38px; position:relative; z-index:2;
    }
    .stat-card {
      background:linear-gradient(135deg, var(--navy2), var(--navy3));
      border:1px solid rgba(46,196,182,0.15);
      border-radius:var(--radius); padding:16px 18px;
      text-align:center; box-shadow:var(--shadow);
    }
    .stat-card b {
      display:block; font-size:32px; font-weight:900;
      line-height:1; color:var(--teal);
    }
    .stat-card small {
      font-size:11px; font-weight:700; color:var(--text-dim);
      letter-spacing:1px; text-transform:uppercase;
    }

    /* ===== SEARCH BAR ===== */
    .search-wrap {
      padding:14px 16px 10px;
      display:flex; gap:10px; align-items:center;
    }
    .search-box {
      flex:1; background:var(--navy2);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:var(--radius); padding:13px 16px;
      font-family:'Nunito',sans-serif; font-size:15px;
      color:var(--text); outline:none;
      transition:border-color 0.2s;
    }
    .search-box::placeholder { color:var(--text-dim); }
    .search-box:focus { border-color:var(--teal); }
    .btn-add {
      background:linear-gradient(135deg,var(--teal),var(--teal2));
      color:#fff; border:none; width:50px; height:50px;
      border-radius:var(--radius); font-size:24px; cursor:pointer;
      box-shadow:0 6px 18px rgba(46,196,182,0.35);
      display:flex; align-items:center; justify-content:center;
      font-weight:700; transition:transform 0.15s;
    }
    .btn-add:active { transform:scale(0.92); }

    /* ===== MEMBER CARD ===== */
    .member-list { padding:4px 16px 8px; }
    .member-card {
      background:var(--navy2);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:var(--radius); padding:14px 16px;
      margin-bottom:10px;
      display:flex; justify-content:space-between; align-items:center;
      box-shadow:0 2px 12px rgba(0,0,0,0.25);
      transition:border-color 0.2s, transform 0.15s;
    }
    .member-card:active { transform:scale(0.99); }
    .member-card.is-niver {
      border-left:4px solid var(--gold);
      background:linear-gradient(90deg, rgba(244,185,66,0.08), var(--navy2));
    }
    .member-avatar {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,var(--teal3),var(--teal));
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:15px; color:#fff;
      flex-shrink:0; margin-right:12px;
    }
    .member-info { flex:1; min-width:0; }
    .member-info h4 {
      font-size:14px; font-weight:800; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .member-info p {
      font-size:12px; color:var(--text-dim); font-weight:600;
    }
    .member-info .cargo-badge {
      display:inline-block; font-size:10px; font-weight:700;
      background:rgba(46,196,182,0.15); color:var(--teal);
      border-radius:6px; padding:2px 7px; margin-top:3px;
      text-transform:uppercase; letter-spacing:0.5px;
    }
    .member-info .cargo-badge.cargo-lider {
      background:rgba(244,185,66,0.15); color:var(--gold);
    }
    .time-badge {
      display:inline-flex; align-items:center; gap:4px;
      font-size:10px; font-weight:700; padding:3px 9px;
      border-radius:8px; margin-top:5px;
      background:rgba(255,255,255,0.07); color:var(--text-dim);
    }
    .time-badge.urgent {
      background:rgba(239,68,68,0.15); color:#f87171;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .member-actions { display:flex; flex-direction:column; gap:6px; margin-left:10px; }
    .btn-action {
      border:none; border-radius:var(--radius-sm); cursor:pointer;
      font-family:'Nunito',sans-serif; font-weight:700;
      font-size:11px; padding:7px 12px; white-space:nowrap;
      display:flex; align-items:center; gap:4px;
      transition:transform 0.15s, opacity 0.15s;
    }
    .btn-action:active { transform:scale(0.93); }
    .btn-edit {
      background:rgba(255,255,255,0.07); color:var(--text-dim);
    }
    .btn-zap {
      background:linear-gradient(135deg,#25d366,#128C7E);
      color:#fff; box-shadow:0 3px 10px rgba(37,211,102,0.25);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position:fixed; bottom:16px; left:16px; right:16px;
      background:linear-gradient(135deg, var(--navy2), var(--navy3));
      border:1px solid rgba(46,196,182,0.15);
      display:flex; padding:8px;
      border-radius:24px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
      z-index:100;
    }
    .nav-item {
      flex:1; color:var(--text-dim); font-size:11px; font-weight:700;
      border-radius:18px; padding:10px 8px;
      background:transparent; border:none; cursor:pointer;
      font-family:'Nunito',sans-serif; letter-spacing:0.5px;
      display:flex; flex-direction:column; align-items:center; gap:3px;
      transition:color 0.2s, background 0.2s;
    }
    .nav-item svg { width:18px; height:18px; }
    .nav-item.active {
      background:rgba(46,196,182,0.15); color:var(--teal);
    }

    /* ===== SECTION HEADER ===== */
    .section-label {
      padding:8px 16px 4px;
      font-size:11px; font-weight:700;
      color:var(--text-dim); text-transform:uppercase;
      letter-spacing:1.5px;
    }

    /* ===== MODAL ===== */
    #form-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(5,15,25,0.88); backdrop-filter:blur(10px);
      z-index:200; align-items:flex-end; justify-content:center;
    }
    .modal-sheet {
      background:linear-gradient(160deg,var(--navy2),var(--navy3));
      border-radius:24px 24px 0 0;
      border-top:1px solid rgba(46,196,182,0.2);
      padding:28px 22px 40px; width:100%; max-width:500px;
      box-shadow:0 -8px 40px rgba(0,0,0,0.6);
      animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to { transform:translateY(0); }
    }
    .modal-handle {
      width:40px; height:4px; background:rgba(255,255,255,0.2);
      border-radius:2px; margin:0 auto 22px; display:block;
    }
    .modal-sheet h3 {
      font-size:18px; font-weight:900; color:var(--text);
      margin-bottom:20px;
    }
    .modal-sheet input,
    .modal-sheet select {
      width:100%; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:var(--radius-sm); padding:13px 15px;
      font-family:'Nunito',sans-serif; font-size:15px;
      color:var(--text); outline:none; margin-bottom:10px;
      transition:border-color 0.2s;
      appearance:none; -webkit-appearance:none;
    }
    .modal-sheet input:focus,
    .modal-sheet select:focus { border-color:var(--teal); }
    .modal-sheet select option { background:var(--navy2); color:var(--text); }
    .btn-save {
      width:100%; background:linear-gradient(135deg,var(--teal),var(--teal2));
      color:#fff; border:none; padding:15px;
      border-radius:var(--radius); font-family:'Nunito',sans-serif;
      font-size:15px; font-weight:800; cursor:pointer;
      letter-spacing:0.5px; margin-bottom:10px;
      box-shadow:0 6px 20px rgba(46,196,182,0.3);
    }
    .btn-cancel {
      width:100%; background:rgba(255,255,255,0.06);
      color:var(--text-dim); border:none; padding:13px;
      border-radius:var(--radius); font-family:'Nunito',sans-serif;
      font-size:14px; font-weight:700; cursor:pointer;
    }
    .btn-danger {
      width:100%; background:rgba(239,68,68,0.08);
      color:rgba(239,68,68,0.7); border:1px solid rgba(239,68,68,0.15);
      padding:10px; border-radius:var(--radius-sm);
      font-family:'Nunito',sans-serif; font-size:11px; cursor:pointer;
      margin-top:12px; font-weight:700;
    }

    /* Empty state */
    .empty-state {
      text-align:center; padding:40px 20px;
      color:var(--text-dim);
    }
    .empty-state svg { width:48px; height:48px; opacity:0.3; margin-bottom:12px; }
    .empty-state p { font-weight:600; font-size:14px; }
  </style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="header-inner">
    <img class="logo-img" src="./logo.jpg" alt="AD Belém">
    <div class="header-text">
      <small>Assembleia de Deus</small>
      <h1>AD Belém Manager</h1>
    </div>
    <button id="btn-install" onclick="instalarPWA()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 16V4M8 12l4 4 4-4M4 20h16"/>
      </svg>
      Instalar
    </button>
  </div>
</header>

<div class="stats-grid">
  <div class="stat-card">
    <b id="dash-total">0</b>
    <small>Membros</small>
  </div>
  <div class="stat-card">
    <b id="dash-niver" style="color:var(--gold)">0</b>
    <small>🎂 No Mês</small>
  </div>
</div>

<div class="search-wrap">
  <input type="text" id="buscaNome" class="search-box" placeholder="🔍  Buscar membro...">
  <button class="btn-add" onclick="abrirForm()" title="Novo membro">+</button>
</div>

<div class="section-label" id="lista-label">LISTA</div>
<div id="lista-membros" class="member-list"></div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-geral" onclick="mudarAba('geral', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75M21 21v-2a4 4 0 0 0-3-3.85"/>
    </svg>
    LISTA
  </button>
  <button class="nav-item" id="nav-niver" onclick="mudarAba('niver', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      <path d="M12 2v2M8 3l1 2M16 3l-1 2"/>
    </svg>
    NIVERS
  </button>
</nav>

<!-- MODAL -->
<div id="form-overlay">
  <div class="modal-sheet">
    <span class="modal-handle"></span>
    <h3 id="form-titulo">✨ Novo Cadastro</h3>
    <input type="hidden" id="f_id">
    <input type="text" id="f_nome" placeholder="Nome Completo">
    <input type="date" id="f_data">
    <select id="f_cargo">
      <option value="Membro">Membro</option>
      <option value="Congregado">Congregado(a)</option>
      <option value="Cooperador">Cooperador(a)</option>
      <option value="Diácono">Diácono(isa)</option>
      <option value="Presbítero">Presbítero(a)</option>
      <option value="Evangelista">Evangelista</option>
      <option value="Pastor">Pastor(a)</option>
    </select>
    <input type="tel" id="f_telefone" placeholder="WhatsApp (ex: 19982839701)">
    <button class="btn-save" onclick="salvar()">SALVAR</button>
    <button class="btn-cancel" onclick="fecharForm()">CANCELAR</button>
    <button class="btn-danger" onclick="resetarDados()">Apagar tudo e reiniciar</button>
  </div>
</div>

<script>
// ============================================================
// DADOS
// ============================================================
const backupMembros = [
  {id:1,  nome:"ANDRESSA APARECIDA",       data:"1999-01-01", cargo:"Membro",     tel:""},
  {id:2,  nome:"JESSICA SOUZA",             data:"1999-01-25", cargo:"Membro",     tel:""},

  {id:5,  nome:"SABRINA CARVALHO",          data:"1999-02-10", cargo:"Membro",     tel:""},
  {id:6,  nome:"LUANA BATISTA",             data:"1997-02-20", cargo:"Membro",     tel:""},
  {id:7,  nome:"JEFERSON BATISTA",          data:"1996-02-20", cargo:"Membro",     tel:""},
  {id:8,  nome:"VICTOR HUGO",               data:"2008-02-29", cargo:"Membro",     tel:""},
  {id:9,  nome:"FERNANDA DE OLIVEIRA",      data:"1997-03-05", cargo:"Membro",     tel:""},
  {id:10, nome:"ALAN QUEIROZ DO MONTE",     data:"2001-03-08", cargo:"Membro",     tel:""},
  {id:11, nome:"ISABELLE GRANADA",          data:"2008-03-14", cargo:"Membro",     tel:""},
  {id:12, nome:"GINAUSIO CORREIA MENEZES",  data:"1960-04-01", cargo:"Membro",     tel:""},
  {id:13, nome:"MARIANA",                   data:"1998-04-01", cargo:"Membro",     tel:""},
  {id:14, nome:"JUNIOR DE OLIVEIRA",        data:"1988-04-12", cargo:"Membro",     tel:""},
  {id:15, nome:"ENZO GABRIEL",              data:"2021-04-14", cargo:"Membro",     tel:""},
  {id:16, nome:"MARIA DA CRUZ CONCEIÇÃO",   data:"1969-05-03", cargo:"Membro",     tel:""},
  {id:17, nome:"CREUZA QUINTELA DA SILVA",  data:"1956-05-08", cargo:"Membro",     tel:""},
  {id:19, nome:"APARECIDA CARDOSO QUINTELA",data:"1935-05-22", cargo:"Membro",     tel:""},
  {id:20, nome:"CRISTINA",                  data:"1975-06-25", cargo:"Membro",     tel:""},
  {id:21, nome:"OZIEL DA FONSECA",          data:"1976-06-05", cargo:"Membro",     tel:""},
  {id:22, nome:"JOSELMA QUEIROZ DO MONTE",  data:"1969-06-12", cargo:"Membro",     tel:""},
  {id:23, nome:"MAYCON APARECIDO CARVALHO", data:"1992-06-19", cargo:"Membro",     tel:""},
  {id:24, nome:"PEDRO HENRIQUE",            data:"2007-06-15", cargo:"Membro",     tel:""},
  {id:25, nome:"ADONIAS QUEIROZ DO MONTE",  data:"1995-07-05", cargo:"Membro",     tel:""},
  {id:26, nome:"NATALINO GERMANO",          data:"1965-08-30", cargo:"Membro",     tel:""},
  {id:27, nome:"ISAQUE GRANADA",            data:"2008-09-13", cargo:"Membro",     tel:""},
  {id:28, nome:"EDERLEI APARECIDO",         data:"1980-09-25", cargo:"Membro",     tel:""},
  {id:29, nome:"APARECIDA DE OLIVEIRA",     data:"1950-10-03", cargo:"Membro",     tel:""},
  {id:30, nome:"MANOELINA FUZATO",          data:"1937-10-03", cargo:"Membro",     tel:""},
  {id:31, nome:"APARECIDA GRANADA",         data:"1970-10-22", cargo:"Membro",     tel:""},
  {id:32, nome:"JANAINA",                   data:"1999-11-27", cargo:"Membro",     tel:""},
  {id:33, nome:"ELISANGELA SILVEIRA",       data:"2000-12-27", cargo:"Membro",     tel:""}
];

const frasesParabens = [
  "Paz do Senhor! Passando para parabenizar o(a) {cargo} {primeiro_nome} por mais um ano de vida! 🎂🎈 Que o Senhor continue abençoando sua caminhada!",
  "Parabéns e a Paz do Senhor, {cargo} {primeiro_nome}! ✨🙏 Que as ricas bênçãos de Deus sejam derramadas sobre sua vida hoje e sempre!",
  "Glória a Deus pela vida do(a) {cargo} {primeiro_nome}! 🎈🙌 Desejamos um dia cheio de graça e alegria. Feliz aniversário!",
  "Paz do Senhor, {cargo} {primeiro_nome}! 🔥📖 Passando para desejar um feliz aniversário! Que o Senhor Jesus renove suas forças!",
  "Feliz aniversário, {cargo} {primeiro_nome}! 🎂✨ Que a boa mão do Senhor esteja sobre ti, trazendo saúde e muita paz!"
];

const CARGOS_LIDER = ["Diácono","Presbítero","Evangelista","Pastor"];

let membros = JSON.parse(localStorage.getItem("church_db_v3")) || backupMembros;
let abaAtual = 'geral';
let notificacaoEnviadaHoje = false;

// ============================================================
// PWA
// ============================================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btn-install').classList.add('show');
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('btn-install').classList.remove('show');
});

async function instalarPWA() {
  if (!deferredPrompt) {
    alert('Para instalar: use o menu do navegador → "Adicionar à tela inicial"');
    return;
  }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted') {
    document.getElementById('btn-install').classList.remove('show');
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('✅ SW registrado'))
    .catch(e => console.warn('SW:', e));
}

if (Notification.permission !== 'granted') {
  Notification.requestPermission();
}

function verificarNotificacaoMatinal() {
  const agora = new Date();
  const hora = agora.getHours();
  const minuto = agora.getMinutes();
  const hojeData = agora.toDateString();
  if (localStorage.getItem('ultima_notificacao_dia') !== hojeData) {
    notificacaoEnviadaHoje = false;
  }
  if (hora === 7 && minuto <= 15 && !notificacaoEnviadaHoje) {
    membros.forEach(m => {
      const dias = calcularProximoNiver(m.data);
      if (dias === 0 || dias === 1) {
        const prefixo = dias === 0 ? "HOJE 🎉: " : "AMANHÃ 🎂: ";
        new Notification("AD Belém - Aniversário", {
          body: prefixo + m.nome,
          icon: './logo.jpg'
        });
      }
    });
    notificacaoEnviadaHoje = true;
    localStorage.setItem('ultima_notificacao_dia', hojeData);
  }
}
setInterval(verificarNotificacaoMatinal, 30000);

// ============================================================
// LÓGICA
// ============================================================
function calcularProximoNiver(dataNasc) {
  const hoje = new Date();
  const [ano, mes, dia] = dataNasc.split('-').map(Number);
  let dataNiver = new Date(hoje.getFullYear(), mes - 1, dia);
  if (dataNiver < new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate())) {
    dataNiver.setFullYear(hoje.getFullYear() + 1);
  }
  const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
  return Math.ceil((dataNiver - h) / (1000 * 60 * 60 * 24));
}

function getInitials(nome) {
  const parts = nome.trim().split(' ').filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return nome.slice(0,2).toUpperCase();
}

function enviarParabens(nomeCompleto, cargo) {
  let pn = nomeCompleto.split(' ')[0];
  pn = pn.charAt(0).toUpperCase() + pn.slice(1).toLowerCase();
  const msg = frasesParabens[Math.floor(Math.random() * frasesParabens.length)]
    .replace('{primeiro_nome}', '*' + pn + '*')
    .replace('{cargo}', cargo);
  window.open('https://wa.me/5519982839701?text=' + encodeURIComponent(msg), '_blank');
}

// ============================================================
// RENDER
// ============================================================
function renderizar() {
  const lista = document.getElementById('lista-membros');
  lista.innerHTML = '';
  const mesAtual = (new Date().getMonth() + 1).toString().padStart(2, '0');
  let niverMesCount = 0;

  let exibir = [...membros];
  if (abaAtual === 'niver') {
    exibir = exibir.map(m => ({...m, diasPara: calcularProximoNiver(m.data)}))
      .sort((a, b) => a.diasPara - b.diasPara);
  } else {
    exibir.sort((a, b) => a.nome.localeCompare(b.nome));
  }

  const termo = document.getElementById('buscaNome').value.toLowerCase();
  if (termo) {
    exibir = exibir.filter(m =>
      m.nome.toLowerCase().includes(termo) ||
      m.cargo.toLowerCase().includes(termo)
    );
  }

  if (exibir.length === 0) {
    lista.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Nenhum membro encontrado</p>
      </div>`;
  }

  exibir.forEach(m => {
    const [ano, mes, dia] = m.data.split('-');
    const isNiverMes = mes === mesAtual;
    if (isNiverMes) niverMesCount++;
    const diasPara = calcularProximoNiver(m.data);
    const isLider = CARGOS_LIDER.includes(m.cargo);
    const initials = getInitials(m.nome);

    const card = document.createElement('div');
    card.className = 'member-card' + (isNiverMes ? ' is-niver' : '');
    card.innerHTML = `
      <div class="member-avatar" style="background:linear-gradient(135deg, ${isLider ? '#b45309,#d97706' : isNiverMes ? '#92400e,#d97706' : 'var(--teal3),var(--teal)'})">${initials}</div>
      <div class="member-info">
        <h4>${m.nome}</h4>
        <p>${dia}/${mes}</p>
        <span class="cargo-badge${isLider ? ' cargo-lider' : ''}">${m.cargo}</span>
        ${abaAtual === 'niver' ? `<br><span class="time-badge ${diasPara <= 7 ? 'urgent' : ''}">${diasPara === 0 ? '🎉 HOJE!' : diasPara === 1 ? '🎂 Amanhã' : '⏳ ' + diasPara + ' dias'}</span>` : ''}
      </div>
      <div class="member-actions">
        <button class="btn-action btn-edit" onclick="editar(${m.id})">✏️ Editar</button>
        <button class="btn-action btn-zap" onclick="enviarParabens('${m.nome.replace(/'/g,"\\'")}','${m.cargo}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M5.077 20c-.557 0-1.091-.133-1.569-.393A11.985 11.985 0 0 1 1.24 3.62C3.003 1.86 5.377 1 7.87 1c2.494 0 4.866.86 6.631 2.62 1.764 1.759 2.737 4.127 2.737 6.621 0 2.493-.972 4.861-2.737 6.621-1.765 1.76-4.137 2.62-6.631 2.62a11.92 11.92 0 0 1-2.793-.333zM12 2.4C7.777 2.4 4.4 5.777 4.4 10S7.777 17.6 12 17.6 19.6 14.223 19.6 10 16.223 2.4 12 2.4z"/></svg>
          ZAP
        </button>
      </div>`;
    lista.appendChild(card);
  });

  document.getElementById('dash-total').textContent = membros.length;
  document.getElementById('dash-niver').textContent = niverMesCount;
  document.getElementById('lista-label').textContent =
    abaAtual === 'niver' ? '🎂 PRÓXIMOS ANIVERSÁRIOS' : '👥 MEMBROS';
  localStorage.setItem('church_db_v3', JSON.stringify(membros));
}

// ============================================================
// CRUD
// ============================================================
function salvar() {
  const id = document.getElementById('f_id').value;
  const nome = document.getElementById('f_nome').value.trim();
  const data = document.getElementById('f_data').value;
  if (!nome || !data) { alert('Preencha Nome e Data!'); return; }

  const novo = {
    id: id ? parseInt(id) : Date.now(),
    nome: nome.toUpperCase(),
    data: data,
    cargo: document.getElementById('f_cargo').value,
    tel: document.getElementById('f_telefone').value.replace(/\D/g, '')
  };

  if (id) {
    const idx = membros.findIndex(m => m.id === parseInt(id));
    membros[idx] = novo;
  } else {
    membros.push(novo);
  }
  renderizar();
  fecharForm();
}

function editar(id) {
  const m = membros.find(item => item.id === id);
  document.getElementById('f_id').value = m.id;
  document.getElementById('f_nome').value = m.nome;
  document.getElementById('f_data').value = m.data;
  document.getElementById('f_cargo').value = m.cargo;
  document.getElementById('f_telefone').value = m.tel;
  document.getElementById('form-titulo').textContent = '✏️ Editar Membro';
  abrirForm();
}

function resetarDados() {
  if (confirm('Isso voltará para a lista original de ' + backupMembros.length + ' membros. Confirma?')) {
    membros = [...backupMembros];
    renderizar();
    fecharForm();
  }
}

function mudarAba(aba, btn) {
  abaAtual = aba;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderizar();
}

function abrirForm() {
  document.getElementById('form-overlay').style.display = 'flex';
}
function fecharForm() {
  document.getElementById('form-overlay').style.display = 'none';
  document.getElementById('f_id').value = '';
  document.getElementById('f_nome').value = '';
  document.getElementById('f_data').value = '';
  document.getElementById('f_cargo').value = 'Membro';
  document.getElementById('f_telefone').value = '';
  document.getElementById('form-titulo').textContent = '✨ Novo Cadastro';
}

document.getElementById('buscaNome').addEventListener('input', renderizar);

// Fechar modal ao clicar fora
document.getElementById('form-overlay').addEventListener('click', function(e) {
  if (e.target === this) fecharForm();
});

window.onload = renderizar;
</script>
